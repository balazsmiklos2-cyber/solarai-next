<!DOCTYPE html>
<html>

<head>
  <title>SOLAR-AI</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    body{
      background:#0b1020;
      color:white;
      font-family:Arial;
      padding:30px;
    }

    .card{
      background:#151c2f;
      border-radius:20px;
      padding:20px;
      margin-bottom:20px;
    }

    .value{
      font-size:48px;
      font-weight:bold;
    }

    .online{
      color:#00ff88;
    }

    .offline{
      color:#ff5555;
    }
  </style>
</head>

<body>

<h1>SOLAR-AI Dashboard</h1>

<div class="card">
  <div>Temperature</div>
  <div class="value" id="temp">--.-°C</div>
</div>

<div class="card">
  <div>Battery</div>
  <div class="card">
  <canvas id="tempChart"></canvas>
</div>

<div class="card">
  <canvas id="batteryChart"></canvas>
</div>
  
  <div class="value" id="battery">--.--V</div>
</div>

  <div class="card">

  <h2>
    Wake Timeline
  </h2>

  <div id="wakeLog">

  </div>

</div>
  
<div class="card">
  <div>
    MQTT:
    <span id="status" class="offline">
      OFFLINE
    </span>
  </div>

  <br>

  <div>
    Last Update:
    <span id="lastUpdate">
      --
    </span>
  </div>
</div>

<script>

  const tempHistory =
  JSON.parse(
    localStorage.getItem('tempHistory')
    || '[]'
  );

const tempLabels =
  JSON.parse(
    localStorage.getItem('tempLabels')
    || '[]'
  );

const batteryHistory =
  JSON.parse(
    localStorage.getItem('batteryHistory')
    || '[]'
  );

const batteryLabels =
  JSON.parse(
    localStorage.getItem('batteryLabels')
    || '[]'
  );
  let lastBattery = null;
  
const client = mqtt.connect(
  'wss://broker.hivemq.com:8884/mqtt'
);

const tempEl =
  document.getElementById('temp');

const battEl =
  document.getElementById('battery');

const statusEl =
  document.getElementById('status');

const updateEl =
  document.getElementById('lastUpdate');

const wakeLogEl =
document.getElementById('wakeLog');

client.on(
  'connect',
  () => {

    console.log('MQTT CONNECTED');

    statusEl.innerHTML =
      'ONLINE';

    statusEl.className =
      'online';

    client.subscribe(
      'solarai/balazsnode9284/temp'
    );

    client.subscribe(
      'solarai/balazsnode9284/battery'
    );
    client.subscribe(
  'solarai/balazsnode9284/wake'
);
  }
);

client.on(
  'message',
  (topic, message) => {

    const value =
      message.toString();

    console.log(
      topic,
      value
    );

    if(
  topic ==
  'solarai/balazsnode9284/temp'
){

  const t =
    parseFloat(value);

  let color =
    '#ffffff';

  if(t < 10){
    color = '#66ccff';
  }
  else if(t > 30){
    color = '#ff8844';
  }

  tempEl.style.color =
    color;

  tempEl.innerHTML =
    value + '°C';

  tempHistory.push(t);

  tempLabels.push(
    new Date().toLocaleTimeString()
  );

  if(tempHistory.length > 500){

    tempHistory.shift();

    tempLabels.shift();
  }

  tempChart.update();

  localStorage.setItem(
    'tempHistory',
    JSON.stringify(tempHistory)
  );

  localStorage.setItem(
    'tempLabels',
    JSON.stringify(tempLabels)
  );
}
    
    if(
  topic ==
  'solarai/balazsnode9284/battery'
){

  let icon = '🔋';

  const v =
    parseFloat(value);

  if(v > 4.0){
    icon = '🟢';
  }
  else if(v > 3.7){
    icon = '🟡';
  }
  else{
    icon = '🔴';
  }

  let trend =
  '';

if(lastBattery != null){

  const diff =
    v - lastBattery;

  if(diff > 0.01){

    trend = ' ☀️';
  }
  else if(diff < -0.01){

    trend = ' 🌙';
  }
}

lastBattery = v;

battEl.innerHTML =
  icon
  + trend
  + ' '
  + value
  + 'V';

    batteryHistory.push(v);

batteryLabels.push(
  new Date().toLocaleTimeString()
);

if(batteryHistory.length > 500){

  batteryHistory.shift();

  batteryLabels.shift();
}

batteryChart.update();

localStorage.setItem(
  'batteryHistory',
  JSON.stringify(batteryHistory)
);

localStorage.setItem(
  'batteryLabels',
  JSON.stringify(batteryLabels)
);
}

if(
  topic ==
  'solarai/balazsnode9284/wake'
){

  const now =
    new Date().toLocaleTimeString();

  wakeLogEl.innerHTML =
    '<div>'
    + now
    + ' '
    + value
    + '</div>'
    + wakeLogEl.innerHTML;
}
    updateEl.innerHTML =
      new Date().toLocaleTimeString();
  }
);

client.on(
  'error',
  (err) => {

    console.log(err);

    statusEl.innerHTML =
      'ERROR';

    statusEl.className =
      'offline';
  }
);

  const tempChart = new Chart(
  document.getElementById('tempChart'),
  {
    type:'line',

    data:{
      labels:tempLabels,

      datasets:[
        {
          label:'Temperature',
          data:tempHistory,
          borderColor:'#66ccff',
          tension:0.3
        }
      ]
    }
  }
);

const batteryChart = new Chart(
  document.getElementById('batteryChart'),
  {
    type:'line',

    data:{
      labels:batteryLabels,

      datasets:[
        {
          label:'Battery',
          data:batteryHistory,
          borderColor:'#00ff88',
          tension:0.3
        }
      ]
    }
  }
);
  
tempChart.update();
batteryChart.update();

if(tempHistory.length > 0){

  tempEl.innerHTML =
    tempHistory[
      tempHistory.length - 1
    ] + '°C';
}

if(batteryHistory.length > 0){

  battEl.innerHTML =
    batteryHistory[
      batteryHistory.length - 1
    ] + 'V';
}
</script>

</body>
</html>
