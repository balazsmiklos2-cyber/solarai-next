<!DOCTYPE html>
<html>

<head>
  <title>SOLAR-AI</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body{
      background:#0b1020;
      color:white;
      font-family:Arial;
      padding:30px;
    }

    .card{
      background:#151c2f;
      border-radius:20px;
      padding:20px;
      margin-bottom:20px;
    }

    .value{
      font-size:48px;
      font-weight:bold;
    }

    .online{
      color:#00ff88;
    }

    .offline{
      color:#ff5555;
    }
  </style>
</head>

<body>

<h1>SOLAR-AI Dashboard</h1>

<div class="card">
  <div>Temperature</div>
  <div class="value" id="temp">--.-°C</div>
</div>

<div class="card">
  <div>Battery</div>
  <div class="value" id="battery">--.--V</div>
</div>

<div class="card">
  <div>
    MQTT:
    <span id="status" class="offline">
      OFFLINE
    </span>
  </div>

  <br>

  <div>
    Last Update:
    <span id="lastUpdate">
      --
    </span>
  </div>
</div>

<script>

const client = mqtt.connect(
  'wss://broker.hivemq.com:8884/mqtt'
);

const tempEl =
  document.getElementById('temp');

const battEl =
  document.getElementById('battery');

const statusEl =
  document.getElementById('status');

const updateEl =
  document.getElementById('lastUpdate');

client.on(
  'connect',
  () => {

    console.log('MQTT CONNECTED');

    statusEl.innerHTML =
      'ONLINE';

    statusEl.className =
      'online';

    client.subscribe(
      'solarai/balazsnode9284/temp'
    );

    client.subscribe(
      'solarai/balazsnode9284/battery'
    );
  }
);

client.on(
  'message',
  (topic, message) => {

    const value =
      message.toString();

    console.log(
      topic,
      value
    );

    if(
  topic ==
  'solarai/balazsnode9284/temp'
){

  const t =
    parseFloat(value);

  let color =
    '#ffffff';

  if(t < 10){
    color = '#66ccff';
  }
  else if(t > 30){
    color = '#ff8844';
  }

  tempEl.style.color =
    color;

  tempEl.innerHTML =
    value + '°C';
}

    if(
  topic ==
  'solarai/balazsnode9284/battery'
){

  let icon = '🔋';

  const v =
    parseFloat(value);

  if(v > 4.0){
    icon = '🟢';
  }
  else if(v > 3.7){
    icon = '🟡';
  }
  else{
    icon = '🔴';
  }

  battEl.innerHTML =
    icon + ' ' + value + 'v';
}

    updateEl.innerHTML =
      new Date().toLocaleTimeString();
  }
);

client.on(
  'error',
  (err) => {

    console.log(err);

    statusEl.innerHTML =
      'ERROR';

    statusEl.className =
      'offline';
  }
);

</script>

</body>
</html>
