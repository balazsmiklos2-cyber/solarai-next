<!DOCTYPE html>
<html>

<head>

  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="icon-192.png">
  
  <title>SOLAR-AI</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    body{
      background:#0b1020;
      color:white;
      font-family:Arial;
      padding:30px;
    }

    .card{
      background:#151c2f;
      border-radius:20px;
      padding:20px;
      margin-bottom:20px;
    }

    .value{
      font-size:48px;
      font-weight:bold;
    }

    .online{
      color:#00ff88;
    }

    .offline{
      color:#ff5555;
    }
  </style>
</head>

<body>

<h1>SOLAR-AI Dashboard</h1>

<div class="card">
  <div>Temperature</div>
  <div class="value" id="temp">--.-°C</div>
</div>

<div class="card">
  <div>Battery</div>
  <div class="card">
  <canvas id="tempChart"></canvas>
</div>

<div class="card">
  <canvas id="batteryChart"></canvas>
</div>
  
  <div class="value" id="battery">--.--V</div>
</div>

  <div class="card">

  <h2>
    Wake Timeline
  </h2>

  <div id="wakeLog">

  </div>

</div>

<div class="card">

  <h2>
    Power Analytics
  </h2>

  <div id="drainRate">
    Calculating...
  </div>

</div>

<div class="card">

  <h2>
    Runtime Prediction
  </h2>

  <div id="runtimePrediction">
    Calculating...
  </div>

</div>
  
<div class="card">

  <h2>
    Device Status
  </h2>

  <div id="deviceStatus">
    UNKNOWN
  </div>

  <br>

  <div id="lastSeen">
    --
  </div>

</div>
  
<div class="card">
  <div>
    MQTT:
    <span id="status" class="offline">
      OFFLINE
    </span>
  </div>

  <br>

  <div>
    Last Update:
    <span id="lastUpdate">
      --
    </span>
  </div>
</div>

<script>

  const tempHistory =
  JSON.parse(
    localStorage.getItem('tempHistory')
    || '[]'
  );

const tempLabels =
  JSON.parse(
    localStorage.getItem('tempLabels')
    || '[]'
  );

const batteryHistory =
  JSON.parse(
    localStorage.getItem('batteryHistory')
    || '[]'
  );

const batteryLabels =
  JSON.parse(
    localStorage.getItem('batteryLabels')
    || '[]'
  );
  const timeLabels =
  JSON.parse(
    localStorage.getItem('timeLabels')
    || '[]'
  );

let lastWakeTime = "--:--";
  
    localStorage.getItem('timeLabels')
    || '[]'
  );
  let lastBattery = null;

  // FIX ARRAY DESYNC

while(
  batteryLabels.length >
  batteryHistory.length
){
  batteryLabels.shift();
}

while(
  batteryHistory.length >
  batteryLabels.length
){
  batteryHistory.shift();
}

while(
  tempLabels.length >
  tempHistory.length
){
  tempLabels.shift();
}

while(
  tempHistory.length >
  tempLabels.length
){
  tempHistory.shift();
}
  
const client = mqtt.connect(
  'wss://broker.hivemq.com:8884/mqtt'
);

const tempEl =
  document.getElementById('temp');

const battEl =
  document.getElementById('battery');

const statusEl =
  document.getElementById('status');

const updateEl =
  document.getElementById('lastUpdate');

const wakeLogEl =
document.getElementById('wakeLog');

const deviceStatusEl =
document.getElementById('deviceStatus');

const lastSeenEl =
document.getElementById('lastSeen');

const drainRateEl =
document.getElementById('drainRate');

const runtimeEl =
document.getElementById('runtimePrediction');

client.on(
  'connect',
  () => {

    console.log('MQTT CONNECTED');

    statusEl.innerHTML =
      'ONLINE';

    statusEl.className =
      'online';

    client.subscribe(
      'solarai/balazsnode9284/temp'
    );

    client.subscribe(
      'solarai/balazsnode9284/battery'
    );
    client.subscribe(
  'solarai/balazsnode9284/wake'
);
  }
);

client.on(
  'message',
  (topic, message) => {

    const value =
      message.toString();

    console.log(
      topic,
      value
    );

    if(
  topic ==
  'solarai/balazsnode9284/temp'
){

  const t =
    parseFloat(value);

  let color =
    '#ffffff';

  if(t < 10){
    color = '#66ccff';
  }
  else if(t > 30){
    color = '#ff8844';
  }

  tempEl.style.color =
    color;

  tempEl.innerHTML =
    value + '°C';

  tempHistory.push(t);

if(tempLabels.length > 500){

  tempLabels.shift();
}

tempLabels.push(
  lastWakeTime
);

  if(tempHistory.length > 500){

  tempHistory.shift();

  tempLabels.shift();
}

tempChart.data.labels =
  tempLabels;

tempChart.data.datasets[0].data =
  tempHistory;

tempChart.update();

  localStorage.setItem(
    'tempHistory',
    JSON.stringify(tempHistory)
  );

  localStorage.setItem(
    'tempLabels',
    JSON.stringify(tempLabels)
  );
}
    
    if(
  topic ==
  'solarai/balazsnode9284/battery'
){

  let icon = '🔋';

  const v =
    parseFloat(value);

  if(v > 4.0){
    icon = '🟢';
  }
  else if(v > 3.7){
    icon = '🟡';
  }
  else{
    icon = '🔴';
  }

  let trend =
  '';

if(lastBattery != null){

  const diff =
    v - lastBattery;

  if(diff > 0.01){

    trend = ' ☀️';
  }
  else if(diff < -0.01){

    trend = ' 🌙';
  }
}

lastBattery = v;

battEl.innerHTML =
  icon
  + trend
  + ' '
  + value
  + 'V';

batteryHistory.push(v);

batteryLabels.push(
  lastWakeTime
);

if(batteryHistory.length > 500){

  batteryHistory.shift();

  batteryLabels.shift();
}

batteryChart.data.labels =
  batteryLabels;

batteryChart.data.datasets[0].data =
  batteryHistory;

batteryChart.update();

if(
  batteryHistory.length > 2
){

  const first =
    batteryHistory[0];

  const last =
    batteryHistory[
      batteryHistory.length - 1
    ];

  const diff =
    last - first;

  const hours =
    batteryHistory.length
    * 20
    / 60;

  const rate =
    diff / hours;

if(rate > 0){

  drainRateEl.innerHTML =
    '☀️ Charge: +'
    + rate.toFixed(3)
    + ' V/h';

  runtimeEl.innerHTML =
    '♾️ Unlimited (charging)';
}
else{

  drainRateEl.innerHTML =
    '🌙 Drain: '
    + rate.toFixed(3)
    + ' V/h';

  const remaining =
    last - 3.0;

  const runtime =
    remaining / Math.abs(rate);

  runtimeEl.innerHTML =
    '⏳ '
    + runtime.toFixed(1)
    + ' h remaining';
}
localStorage.setItem(
  'batteryHistory',
  JSON.stringify(batteryHistory)
);

localStorage.setItem(
  'batteryLabels',
  JSON.stringify(batteryLabels)
);
}
}

    
if(
  topic ==
  'solarai/balazsnode9284/wake'
){
  lastWakeTime =
  new Date().toLocaleTimeString();

  const now =
    new Date().toLocaleTimeString();

  wakeLogEl.innerHTML =
    '<div>'
    + now
    + ' '
    + value
    + '</div>'
    + wakeLogEl.innerHTML;
}
    updateEl.innerHTML =
      new Date().toLocaleTimeString();

    deviceStatusEl.innerHTML =
  '🟢 ONLINE';

lastSeenEl.innerHTML =
  'Last update: '
  + new Date().toLocaleTimeString();

clearTimeout(window.sleepTimer);

window.sleepTimer =
  setTimeout(
    () => {

      deviceStatusEl.innerHTML =
        '🌙 SLEEPING';

    },
    90000
  );
  }
);

client.on(
  'error',
  (err) => {

    console.log(err);

    statusEl.innerHTML =
      'ERROR';

    statusEl.className =
      'offline';
  }
);

  const tempChart = new Chart(
  document.getElementById('tempChart'),
  {
    type:'line',

    data:{
      labels: tempLabels,

      datasets:[
        {
          label:'Temperature',
          data:tempHistory,
          borderColor:'#66ccff',
          tension:0.3
        }
      ]
    }
  }
);

const batteryChart = new Chart(
  document.getElementById('batteryChart'),
  {
    type:'line',

    data:{
      labels:batteryLabels,

      datasets:[
        {
          label:'Battery',
          data:batteryHistory,
          borderColor:'#00ff88',
          tension:0.3
        }
      ]
    }
  }
);
  
tempChart.update();
batteryChart.update();

if(tempHistory.length > 0){

  tempEl.innerHTML =
    tempHistory[
      tempHistory.length - 1
    ] + '°C';
}

if(batteryHistory.length > 0){

  battEl.innerHTML =
    batteryHistory[
      batteryHistory.length - 1
    ] + 'V';
}
</script>

<script>

if("serviceWorker" in navigator){

  navigator.serviceWorker.register(
    "/sw.js"
  );

}

</script>

</body>
</html>
